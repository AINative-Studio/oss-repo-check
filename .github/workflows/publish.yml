name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # required for npm trusted publishing provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build and test
        run: npm run build && npm run test:coverage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Subprocess integration tests use spawnSync with a 30s timeout;
          # on CI runners the scan can take longer without a warm cache.
          QUAID_SUBPROCESS_TIMEOUT: '90000'

      - name: Publish
        # --ignore-scripts skips the prepublishOnly hook (build+test already done above).
        # --provenance uses the OIDC id-token for trusted publishing via GitHub Actions OIDC.
        # NODE_AUTH_TOKEN must be cleared so npm uses the OIDC path instead of the token that
        # actions/setup-node injects for all subsequent steps when registry-url is set.
        run: npm publish --access public --provenance --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ''
