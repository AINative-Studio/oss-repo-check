name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to publish (e.g. v0.1.2)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write  # required for npm trusted publishing provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build and test
        run: npm run build && npm run test:coverage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Subprocess integration tests use spawnSync with a 30s timeout;
          # on CI runners the scan can take longer without a warm cache.
          QUAID_SUBPROCESS_TIMEOUT: '90000'

      - name: Publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
