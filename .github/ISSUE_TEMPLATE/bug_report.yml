name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the fields below so we can reproduce and fix the issue.

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `quaid-scanner --version`
      placeholder: "0.1.1"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: The exact commands or inputs that trigger the bug.
      placeholder: |
        1. Run `quaid-scanner . --depth quick --format json`
        2. See error in output...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node.js version, OS, and any relevant env vars (no secrets).
      placeholder: |
        Node: 20.11.0
        OS: macOS 14.4
        GITHUB_TOKEN set: yes/no
